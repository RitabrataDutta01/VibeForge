{% extends "accounts/base.html" %}
{% block title %}Add Employee{% endblock %}
{% block content %}

<div class="hdr">
    <h1 style="font-size:22px; font-weight:700;">Add New Employee</h1>
</div>

<div class="card" style="max-width:500px;">
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="alert alert-danger" role="alert" style="margin-top:6px; padding:6px 10px; font-size:12px;">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Create Account</button>
    </form>
</div>
{% endblock %}
