{% extends "accounts/base.html" %}
{% block title %}Login{% endblock %}
{% block auth_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:400px;">
        <div class="hdr">
            <h1 style="font-size:20px; font-weight:700;">HRMS Login</h1>
        </div>

        {% if error %}
            <div class="alert alert-danger" role="alert"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
